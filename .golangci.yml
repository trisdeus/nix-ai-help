version: 2

run:
  timeout: 5m

linters-settings:
  govet:
    check-shadowing: false

linters:
  enable:
    - errcheck
    - govet
    - staticcheck

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - staticcheck
    - path: vendor/
      linters:
        - errcheck
        - staticcheck
        - govet
    - linters:
        - staticcheck
      text: "SA1019.*deprecated"
    - linters:
        - staticcheck
      text: "should use.*instead"
  max-issues-per-linter: 20
  max-same-issues: 5
