{{define "title"}}Fleet Management - nixai{{end}}

{{define "content"}}
<div class="nixai-container">
    <!-- Fleet Header -->
    <div class="nixai-header">
        <h1 class="nixai-title">Fleet Management</h1>
        <p class="nixai-subtitle">Manage and monitor your NixOS machines at scale</p>
        
        <div class="nixai-actions">
            <button class="nixai-button nixai-button-primary" onclick="addMachine()">
                <i class="fas fa-plus"></i> Add Machine
            </button>
            <button class="nixai-button nixai-button-secondary" onclick="bulkDeploy()">
                <i class="fas fa-rocket"></i> Bulk Deploy
            </button>
            <button class="nixai-button nixai-button-secondary" onclick="refreshFleet()">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>
    </div>

    <!-- Fleet Stats -->
    <div class="nixai-grid nixai-grid-cols-4 nixai-gap">
        <div class="nixai-card">
            <div class="nixai-card-content">
                <div class="stat-item">
                    <div class="stat-icon text-success">
                        <i class="fas fa-server"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalMachines">0</div>
                        <div class="stat-label">Total Machines</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nixai-card">
            <div class="nixai-card-content">
                <div class="stat-item">
                    <div class="stat-icon text-success">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value" id="healthyMachines">0</div>
                        <div class="stat-label">Healthy</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nixai-card">
            <div class="nixai-card-content">
                <div class="stat-item">
                    <div class="stat-icon text-warning">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value" id="warningMachines">0</div>
                        <div class="stat-label">Warnings</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nixai-card">
            <div class="nixai-card-content">
                <div class="stat-item">
                    <div class="stat-icon text-error">
                        <i class="fas fa-times-circle"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value" id="errorMachines">0</div>
                        <div class="stat-label">Errors</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Fleet Actions Bar -->
    <div class="nixai-card nixai-mt">
        <div class="nixai-card-content">
            <div class="fleet-actions">
                <div class="search-filter">
                    <input type="text" id="machineSearch" placeholder="Search machines..." class="nixai-input">
                    <select id="statusFilter" class="nixai-select">
                        <option value="">All Status</option>
                        <option value="healthy">Healthy</option>
                        <option value="warning">Warning</option>
                        <option value="error">Error</option>
                        <option value="offline">Offline</option>
                    </select>
                    <select id="tagFilter" class="nixai-select">
                        <option value="">All Tags</option>
                        <option value="production">Production</option>
                        <option value="staging">Staging</option>
                        <option value="development">Development</option>
                    </select>
                </div>
                <div class="bulk-actions">
                    <button class="nixai-button nixai-button-small" onclick="selectAll()" id="selectAllBtn">
                        <i class="fas fa-check-square"></i> Select All
                    </button>
                    <button class="nixai-button nixai-button-small" onclick="bulkUpdate()" disabled id="bulkUpdateBtn">
                        <i class="fas fa-sync"></i> Update Selected
                    </button>
                    <button class="nixai-button nixai-button-small" onclick="bulkReboot()" disabled id="bulkRebootBtn">
                        <i class="fas fa-power-off"></i> Reboot Selected
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Machines Grid -->
    <div class="nixai-grid nixai-grid-cols-1 nixai-gap" id="machinesGrid">
        <!-- Machine cards will be dynamically inserted here -->
    </div>

    <!-- Deployment History -->
    <div class="nixai-card nixai-mt">
        <div class="nixai-card-header">
            <h3>Recent Deployments</h3>
            <div class="nixai-actions-small">
                <button class="nixai-button nixai-button-small" onclick="viewAllDeployments()">
                    <i class="fas fa-history"></i> View All
                </button>
            </div>
        </div>
        <div class="nixai-card-content">
            <div class="deployment-timeline" id="deploymentTimeline">
                <!-- Deployment entries will be inserted here -->
            </div>
        </div>
    </div>
</div>

<!-- Add Machine Modal -->
<div id="addMachineModal" class="nixai-modal">
    <div class="nixai-modal-content">
        <div class="nixai-modal-header">
            <h2>Add New Machine</h2>
            <button class="nixai-modal-close" onclick="closeModal('addMachineModal')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="nixai-modal-body">
            <form id="addMachineForm">
                <div class="form-group">
                    <label for="machineName">Machine Name</label>
                    <input type="text" id="machineName" name="name" class="nixai-input" required>
                </div>
                <div class="form-group">
                    <label for="machineHost">Hostname/IP</label>
                    <input type="text" id="machineHost" name="host" class="nixai-input" required>
                </div>
                <div class="form-group">
                    <label for="machineUser">SSH User</label>
                    <input type="text" id="machineUser" name="user" class="nixai-input" value="root">
                </div>
                <div class="form-group">
                    <label for="machinePort">SSH Port</label>
                    <input type="number" id="machinePort" name="port" class="nixai-input" value="22">
                </div>
                <div class="form-group">
                    <label for="machineTags">Tags (comma-separated)</label>
                    <input type="text" id="machineTags" name="tags" class="nixai-input" placeholder="production, web-server, database">
                </div>
                <div class="form-group">
                    <label for="machineConfig">Configuration Template</label>
                    <select id="machineConfig" name="config" class="nixai-select">
                        <option value="">Select template...</option>
                        <option value="server">Basic Server</option>
                        <option value="desktop">Desktop</option>
                        <option value="container">Container Host</option>
                        <option value="database">Database Server</option>
                    </select>
                </div>
            </form>
        </div>
        <div class="nixai-modal-footer">
            <button class="nixai-button nixai-button-secondary" onclick="closeModal('addMachineModal')">Cancel</button>
            <button class="nixai-button nixai-button-primary" onclick="saveMachine()">Add Machine</button>
        </div>
    </div>
</div>

<!-- Machine Details Modal -->
<div id="machineDetailsModal" class="nixai-modal nixai-modal-large">
    <div class="nixai-modal-content">
        <div class="nixai-modal-header">
            <h2 id="machineDetailsTitle">Machine Details</h2>
            <button class="nixai-modal-close" onclick="closeModal('machineDetailsModal')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="nixai-modal-body">
            <div class="machine-details-tabs">
                <div class="tab-nav">
                    <button class="tab-button active" onclick="switchTab('overview')">Overview</button>
                    <button class="tab-button" onclick="switchTab('configuration')">Configuration</button>
                    <button class="tab-button" onclick="switchTab('logs')">Logs</button>
                    <button class="tab-button" onclick="switchTab('monitoring')">Monitoring</button>
                </div>
                <div class="tab-content">
                    <div id="overview-tab" class="tab-pane active">
                        <!-- Machine overview content -->
                    </div>
                    <div id="configuration-tab" class="tab-pane">
                        <!-- Configuration content -->
                    </div>
                    <div id="logs-tab" class="tab-pane">
                        <!-- Logs content -->
                    </div>
                    <div id="monitoring-tab" class="tab-pane">
                        <!-- Monitoring content -->
                    </div>
                </div>
            </div>
        </div>
        <div class="nixai-modal-footer">
            <button class="nixai-button nixai-button-secondary" onclick="closeModal('machineDetailsModal')">Close</button>
            <button class="nixai-button nixai-button-primary" onclick="deployToMachine()">Deploy Changes</button>
        </div>
    </div>
</div>

<script>
let selectedMachines = new Set();
let allMachines = [];

// Initialize fleet management
document.addEventListener('DOMContentLoaded', function() {
    loadFleetData();
    setupEventListeners();
    
    // Setup real-time updates via WebSocket
    if (window.nixaiWS) {
        window.nixaiWS.addEventListener('message', function(event) {
            const data = JSON.parse(event.data);
            if (data.type === 'fleet_update') {
                updateMachineStatus(data.machine_id, data.status);
            }
        });
    }
});

function setupEventListeners() {
    // Search and filter
    document.getElementById('machineSearch').addEventListener('input', filterMachines);
    document.getElementById('statusFilter').addEventListener('change', filterMachines);
    document.getElementById('tagFilter').addEventListener('change', filterMachines);
    
    // Bulk actions
    document.addEventListener('change', function(e) {
        if (e.target.classList.contains('machine-checkbox')) {
            updateBulkActions();
        }
    });
}

function loadFleetData() {
    fetch('/api/fleet/machines')
        .then(response => response.json())
        .then(data => {
            allMachines = data.machines || [];
            updateFleetStats();
            renderMachines();
        })
        .catch(error => {
            showNotification('Failed to load fleet data: ' + error.message, 'error');
        });
    
    loadDeploymentHistory();
}

function updateFleetStats() {
    const stats = {
        total: allMachines.length,
        healthy: allMachines.filter(m => m.status === 'healthy').length,
        warning: allMachines.filter(m => m.status === 'warning').length,
        error: allMachines.filter(m => m.status === 'error').length
    };
    
    document.getElementById('totalMachines').textContent = stats.total;
    document.getElementById('healthyMachines').textContent = stats.healthy;
    document.getElementById('warningMachines').textContent = stats.warning;
    document.getElementById('errorMachines').textContent = stats.error;
}

function renderMachines() {
    const grid = document.getElementById('machinesGrid');
    grid.innerHTML = '';
    
    allMachines.forEach(machine => {
        const machineCard = createMachineCard(machine);
        grid.appendChild(machineCard);
    });
}

function createMachineCard(machine) {
    const div = document.createElement('div');
    div.className = 'nixai-card machine-card';
    div.dataset.machineId = machine.id;
    
    const statusClass = {
        'healthy': 'text-success',
        'warning': 'text-warning',
        'error': 'text-error',
        'offline': 'text-muted'
    }[machine.status] || 'text-muted';
    
    const statusIcon = {
        'healthy': 'check-circle',
        'warning': 'exclamation-triangle',
        'error': 'times-circle',
        'offline': 'power-off'
    }[machine.status] || 'question-circle';
    
    div.innerHTML = `
        <div class="nixai-card-content">
            <div class="machine-header">
                <div class="machine-info">
                    <input type="checkbox" class="machine-checkbox" value="${machine.id}">
                    <div class="machine-title">
                        <h4>${machine.name}</h4>
                        <span class="machine-host">${machine.host}</span>
                    </div>
                </div>
                <div class="machine-status">
                    <i class="fas fa-${statusIcon} ${statusClass}"></i>
                    <span class="${statusClass}">${machine.status}</span>
                </div>
            </div>
            
            <div class="machine-details">
                <div class="machine-metrics">
                    <div class="metric">
                        <span class="metric-label">CPU</span>
                        <div class="metric-bar">
                            <div class="metric-fill" style="width: ${machine.cpu || 0}%"></div>
                        </div>
                        <span class="metric-value">${machine.cpu || 0}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Memory</span>
                        <div class="metric-bar">
                            <div class="metric-fill" style="width: ${machine.memory || 0}%"></div>
                        </div>
                        <span class="metric-value">${machine.memory || 0}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Disk</span>
                        <div class="metric-bar">
                            <div class="metric-fill" style="width: ${machine.disk || 0}%"></div>
                        </div>
                        <span class="metric-value">${machine.disk || 0}%</span>
                    </div>
                </div>
                
                <div class="machine-tags">
                    ${(machine.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                </div>
                
                <div class="machine-actions">
                    <button class="nixai-button nixai-button-small" onclick="viewMachine('${machine.id}')">
                        <i class="fas fa-eye"></i> View
                    </button>
                    <button class="nixai-button nixai-button-small" onclick="deployToMachine('${machine.id}')">
                        <i class="fas fa-rocket"></i> Deploy
                    </button>
                    <button class="nixai-button nixai-button-small" onclick="connectToMachine('${machine.id}')">
                        <i class="fas fa-terminal"></i> SSH
                    </button>
                    <div class="dropdown">
                        <button class="nixai-button nixai-button-small dropdown-toggle">
                            <i class="fas fa-ellipsis-v"></i>
                        </button>
                        <div class="dropdown-menu">
                            <a href="#" onclick="rebootMachine('${machine.id}')">Reboot</a>
                            <a href="#" onclick="updateMachine('${machine.id}')">Update</a>
                            <a href="#" onclick="removeMachine('${machine.id}')">Remove</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    return div;
}

function addMachine() {
    showModal('addMachineModal');
}

function saveMachine() {
    const form = document.getElementById('addMachineForm');
    const formData = new FormData(form);
    const machineData = {
        name: formData.get('name'),
        host: formData.get('host'),
        user: formData.get('user'),
        port: parseInt(formData.get('port')),
        tags: formData.get('tags').split(',').map(t => t.trim()).filter(t => t),
        config_template: formData.get('config')
    };
    
    fetch('/api/fleet/machines', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(machineData)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            closeModal('addMachineModal');
            loadFleetData();
            showNotification('Machine added successfully', 'success');
        } else {
            showNotification('Failed to add machine: ' + data.error, 'error');
        }
    })
    .catch(error => {
        showNotification('Failed to add machine: ' + error.message, 'error');
    });
}

function viewMachine(machineId) {
    const machine = allMachines.find(m => m.id === machineId);
    if (!machine) return;
    
    document.getElementById('machineDetailsTitle').textContent = machine.name;
    loadMachineDetails(machineId);
    showModal('machineDetailsModal');
}

function loadMachineDetails(machineId) {
    fetch(`/api/fleet/machines/${machineId}`)
        .then(response => response.json())
        .then(data => {
            populateMachineDetails(data);
        })
        .catch(error => {
            showNotification('Failed to load machine details: ' + error.message, 'error');
        });
}

function populateMachineDetails(machine) {
    // Populate overview tab
    document.getElementById('overview-tab').innerHTML = `
        <div class="machine-overview">
            <div class="overview-section">
                <h4>System Information</h4>
                <div class="key-value-list">
                    <div class="key-value-item">
                        <span class="key">Hostname:</span>
                        <span class="value">${machine.hostname || 'N/A'}</span>
                    </div>
                    <div class="key-value-item">
                        <span class="key">NixOS Version:</span>
                        <span class="value">${machine.nixos_version || 'N/A'}</span>
                    </div>
                    <div class="key-value-item">
                        <span class="key">Kernel:</span>
                        <span class="value">${machine.kernel_version || 'N/A'}</span>
                    </div>
                    <div class="key-value-item">
                        <span class="key">Uptime:</span>
                        <span class="value">${machine.uptime || 'N/A'}</span>
                    </div>
                </div>
            </div>
            
            <div class="overview-section">
                <h4>Hardware</h4>
                <div class="key-value-list">
                    <div class="key-value-item">
                        <span class="key">CPU:</span>
                        <span class="value">${machine.cpu_info || 'N/A'}</span>
                    </div>
                    <div class="key-value-item">
                        <span class="key">Memory:</span>
                        <span class="value">${machine.memory_total || 'N/A'}</span>
                    </div>
                    <div class="key-value-item">
                        <span class="key">Storage:</span>
                        <span class="value">${machine.storage_total || 'N/A'}</span>
                    </div>
                </div>
            </div>
        </div>
    `;
}

function filterMachines() {
    const search = document.getElementById('machineSearch').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;
    const tagFilter = document.getElementById('tagFilter').value;
    
    const filtered = allMachines.filter(machine => {
        const matchesSearch = machine.name.toLowerCase().includes(search) || 
                            machine.host.toLowerCase().includes(search);
        const matchesStatus = !statusFilter || machine.status === statusFilter;
        const matchesTags = !tagFilter || (machine.tags && machine.tags.includes(tagFilter));
        
        return matchesSearch && matchesStatus && matchesTags;
    });
    
    renderFilteredMachines(filtered);
}

function renderFilteredMachines(machines) {
    const grid = document.getElementById('machinesGrid');
    grid.innerHTML = '';
    
    machines.forEach(machine => {
        const machineCard = createMachineCard(machine);
        grid.appendChild(machineCard);
    });
}

function selectAll() {
    const checkboxes = document.querySelectorAll('.machine-checkbox');
    const allSelected = Array.from(checkboxes).every(cb => cb.checked);
    
    checkboxes.forEach(cb => {
        cb.checked = !allSelected;
    });
    
    updateBulkActions();
    document.getElementById('selectAllBtn').innerHTML = 
        `<i class="fas fa-${allSelected ? 'check-square' : 'square'}"></i> ${allSelected ? 'Select All' : 'Deselect All'}`;
}

function updateBulkActions() {
    const selectedCount = document.querySelectorAll('.machine-checkbox:checked').length;
    const bulkButtons = ['bulkUpdateBtn', 'bulkRebootBtn'];
    
    bulkButtons.forEach(btnId => {
        const btn = document.getElementById(btnId);
        btn.disabled = selectedCount === 0;
        btn.textContent = btn.textContent.replace(/\(\d+\)/, selectedCount > 0 ? `(${selectedCount})` : '');
    });
}

function bulkDeploy() {
    const selected = Array.from(document.querySelectorAll('.machine-checkbox:checked'))
                         .map(cb => cb.value);
    
    if (selected.length === 0) {
        showNotification('Please select machines to deploy to', 'warning');
        return;
    }
    
    if (confirm(`Deploy to ${selected.length} selected machines?`)) {
        deployToMachines(selected);
    }
}

function deployToMachines(machineIds) {
    fetch('/api/fleet/deploy', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({machine_ids: machineIds})
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showNotification(`Deployment started for ${machineIds.length} machines`, 'success');
            loadDeploymentHistory();
        } else {
            showNotification('Deployment failed: ' + data.error, 'error');
        }
    })
    .catch(error => {
        showNotification('Deployment failed: ' + error.message, 'error');
    });
}

function loadDeploymentHistory() {
    fetch('/api/fleet/deployments')
        .then(response => response.json())
        .then(data => {
            renderDeploymentHistory(data.deployments || []);
        })
        .catch(error => {
            console.error('Failed to load deployment history:', error);
        });
}

function renderDeploymentHistory(deployments) {
    const timeline = document.getElementById('deploymentTimeline');
    timeline.innerHTML = '';
    
    deployments.slice(0, 10).forEach(deployment => {
        const entry = document.createElement('div');
        entry.className = 'deployment-entry';
        entry.innerHTML = `
            <div class="deployment-status ${deployment.status}">
                <i class="fas fa-${deployment.status === 'success' ? 'check' : 'times'}"></i>
            </div>
            <div class="deployment-info">
                <div class="deployment-title">${deployment.description}</div>
                <div class="deployment-meta">
                    ${deployment.machines.length} machines • ${deployment.duration} • ${deployment.timestamp}
                </div>
            </div>
        `;
        timeline.appendChild(entry);
    });
}

function refreshFleet() {
    showNotification('Refreshing fleet data...', 'info');
    loadFleetData();
}

function switchTab(tabName) {
    // Hide all tab panes
    document.querySelectorAll('.tab-pane').forEach(pane => {
        pane.classList.remove('active');
    });
    
    // Remove active class from all tab buttons
    document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // Show selected tab and mark button as active
    document.getElementById(tabName + '-tab').classList.add('active');
    event.target.classList.add('active');
}
</script>
{{end}}
