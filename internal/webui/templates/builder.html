<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixAI Visual Configuration Builder</title>
    <link rel="stylesheet" href="/static/css/builder.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
</head>
<body>
    <h1>🚀 NixAI Visual Configuration Builder</h1>
    
    <div id="app-container">
        <div id="component-library">
            <div class="loading">Loading components...</div>
        </div>
        
        <div id="builder-canvas">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #6b7280; pointer-events: none;">
                <h3>🎯 Drag Components Here</h3>
                <p>Build your NixOS configuration by dragging components from the library</p>
            </div>
        </div>
        
        <div id="config-preview">
            <h2>📄 Configuration Preview</h2>
            <pre id="nix-config-output"># Loading...</pre>
        </div>
        
        <button id="export-btn">
            📥 Export NixOS Configuration
        </button>
    </div>
    
    <script src="/static/js/config-builder.js"></script>
</body>
</html>
